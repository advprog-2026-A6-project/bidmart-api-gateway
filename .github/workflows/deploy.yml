name: Deploy API Gateway to EC2

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Test and build Spring Boot JAR
        run: ./gradlew clean test bootJar

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload JAR to EC2
        run: |
          JAR_FILE=$(ls build/libs/*.jar | grep -v 'plain' | head -n 1)
          scp -i ~/.ssh/ec2_key.pem \
            "$JAR_FILE" \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/gateway-app.jar

      - name: Deploy and restart gateway
        env:
          AUTH_URL: ${{ secrets.AUTH_SERVICE_URL }}
          AUCTION_URL: ${{ secrets.AUCTION_SERVICE_URL }}
          CATALOG_URL: ${{ secrets.CATALOG_SERVICE_URL }}
          WALLET_URL: ${{ secrets.WALLET_SERVICE_URL }}
          NOTIFICATION_URL: ${{ secrets.NOTIFICATION_SERVICE_URL }}
        run: |
          AUTH_URL="${AUTH_URL:-http://35.168.202.46:8081}"
          AUCTION_URL="${AUCTION_URL:-http://52.45.239.233:8082}"
          CATALOG_URL="${CATALOG_URL:-http://34.194.85.48:8083}"
          WALLET_URL="${WALLET_URL:-http://34.226.162.160:8084}"
          NOTIFICATION_URL="${NOTIFICATION_URL:-http://localhost:8085}"

          ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            sudo mkdir -p /opt/bidmart-api-gateway &&
            sudo mv /tmp/gateway-app.jar /opt/bidmart-api-gateway/app.jar &&
            sudo chown -R ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} /opt/bidmart-api-gateway &&
            sudo mkdir -p /etc/bidmart
          "

          ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "sudo tee /etc/bidmart/gateway.env > /dev/null" << ENVEOF
          SERVER_PORT=8080
          AUTH_SERVICE_URL=${AUTH_URL}
          AUCTION_SERVICE_URL=${AUCTION_URL}
          CATALOG_SERVICE_URL=${CATALOG_URL}
          WALLET_SERVICE_URL=${WALLET_URL}
          NOTIFICATION_SERVICE_URL=${NOTIFICATION_URL}
          ENVEOF

          ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            sudo chmod 600 /etc/bidmart/gateway.env &&
            sudo systemctl daemon-reload &&
            sudo systemctl restart bidmart-api-gateway &&
            sudo systemctl status bidmart-api-gateway --no-pager
          "
