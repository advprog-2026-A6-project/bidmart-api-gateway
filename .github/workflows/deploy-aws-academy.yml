name: Deploy to AWS Academy EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: bidmart-api-gateway
  CONTAINER_NAME: bidmart-api-gateway
  APP_PORT: "8080"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Run tests
        run: sh gradlew test --no-daemon

  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: test
    environment: aws-academy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t "$IMAGE_NAME:${{ github.sha }}" .

      - name: Save Docker image
        run: docker save "$IMAGE_NAME:${{ github.sha }}" | gzip > "$IMAGE_NAME.tar.gz"

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$EC2_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/aws-academy.pem
          chmod 600 ~/.ssh/aws-academy.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Copy image to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: scp -i ~/.ssh/aws-academy.pem "$IMAGE_NAME.tar.gz" "$EC2_USER@$EC2_HOST:/tmp/$IMAGE_NAME.tar.gz"

      - name: Restart container on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          AUTH_SERVICE_URL: ${{ secrets.AUTH_SERVICE_URL }}
          AUCTION_SERVICE_URL: ${{ secrets.AUCTION_SERVICE_URL }}
          CATALOG_SERVICE_URL: ${{ secrets.CATALOG_SERVICE_URL }}
          WALLET_SERVICE_URL: ${{ secrets.WALLET_SERVICE_URL }}
          NOTIFICATION_SERVICE_URL: ${{ secrets.NOTIFICATION_SERVICE_URL }}
        run: |
          ssh -i ~/.ssh/aws-academy.pem "$EC2_USER@$EC2_HOST" \
            "IMAGE_NAME='$IMAGE_NAME' \
             IMAGE_TAG='${{ github.sha }}' \
             CONTAINER_NAME='$CONTAINER_NAME' \
             APP_PORT='$APP_PORT' \
             AUTH_SERVICE_URL='$AUTH_SERVICE_URL' \
             AUCTION_SERVICE_URL='$AUCTION_SERVICE_URL' \
             CATALOG_SERVICE_URL='$CATALOG_SERVICE_URL' \
             WALLET_SERVICE_URL='$WALLET_SERVICE_URL' \
             NOTIFICATION_SERVICE_URL='$NOTIFICATION_SERVICE_URL' \
             bash -s" <<'EOF'
          set -euo pipefail

          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker is not installed on this EC2 instance."
            echo "Install Docker first, then rerun this workflow."
            exit 1
          fi

          docker load -i "/tmp/$IMAGE_NAME.tar.gz"
          docker stop "$CONTAINER_NAME" >/dev/null 2>&1 || true
          docker rm "$CONTAINER_NAME" >/dev/null 2>&1 || true

          env_args=()
          for var_name in \
            AUTH_SERVICE_URL \
            AUCTION_SERVICE_URL \
            CATALOG_SERVICE_URL \
            WALLET_SERVICE_URL \
            NOTIFICATION_SERVICE_URL
          do
            if [ -n "${!var_name:-}" ]; then
              env_args+=("-e" "$var_name=${!var_name}")
            fi
          done

          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p "$APP_PORT:8080" \
            "${env_args[@]}" \
            "$IMAGE_NAME:$IMAGE_TAG"

          docker image prune -f
          rm -f "/tmp/$IMAGE_NAME.tar.gz"
          EOF
